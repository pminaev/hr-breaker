<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cover Letter</title>
    <style>
        @page {
            size: A4;
            margin: 0.35in 0.55in 0.45in 0.55in;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10.5pt;
            line-height: 1.45;
            color: #000;
        }

        a {
            color: #000;
            text-decoration: none;
        }

        /* ── Header ─────────────────────────────────────────── */

        .cl-header {
            margin-bottom: 6pt;
        }

        .cl-header-name {
            font-size: 12pt;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.3pt;
            margin-bottom: 2pt;
        }

        .cl-header-role {
            font-size: 11pt;
            font-weight: bold;
            margin-bottom: 3pt;
        }

        .cl-sender-contact {
            font-size: 10pt;
            color: #000;
            margin-bottom: 0;
        }

        .cl-sender-contact a {
            color: #1155CC;
            text-decoration: underline;
        }

        .cl-sender-contact .sep {
            margin: 0 4pt;
            color: #000;
        }

        /* ── Divider ─────────────────────────────────────────── */

        .cl-divider {
            border: none;
            border-top: 0.75pt solid #000;
            margin-top: 8pt;
            margin-bottom: 16pt;
        }

        /* ── Body sections ───────────────────────────────────── */

        .cl-opening {
            margin-bottom: 11pt;
        }

        .cl-body {
            margin-bottom: 11pt;
        }

        .cl-bullets {
            margin-bottom: 11pt;
            padding-left: 0;
            list-style: none;
        }

        .cl-bullets li {
            position: relative;
            padding-left: 13pt;
            margin-bottom: 4pt;
            font-size: 10.5pt;
            line-height: 1.4;
        }

        .cl-bullets li::before {
            content: "\2022";
            position: absolute;
            left: 0;
            color: #000;
        }

        .cl-optional {
            margin-bottom: 11pt;
        }

        .cl-closing {
            margin-bottom: 14pt;
        }

        /* ── Sign-off + signature ────────────────────────────── */

        .cl-signoff {
            margin-bottom: 6pt;
        }

        .cl-sig-block {
            margin-top: 2pt;
        }

        .cl-sig-img {
            height: 42pt;
            display: block;
        }
    </style>
</head>
<body>
{{BODY}}
<p class="cl-signoff">Best regards,</p>
<div class="cl-sig-block">
    <img src="{{SIGNATURE}}" class="cl-sig-img" alt="">
</div>
</body>
</html>
