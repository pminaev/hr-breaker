<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume</title>
    <style>
        @page {
            size: A4;
            margin: 0.25in 0.45in 0.35in 0.45in;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10pt;
            line-height: 1.3;
            color: #000;
        }

        em, i {
            font-style: normal;
        }

        a {
            color: #000;
            text-decoration: none;
        }

        .contact-line a {
            color: #1155CC;
            text-decoration: underline;
        }

        /* Header */
        .header-name {
            text-align: center;
            margin-bottom: 1pt;
        }

        .name {
            font-size: 12pt;
            font-weight: bold;
        }

        .header-rest {
            text-align: center;
            margin-bottom: 4pt;
        }

        .position-title {
            font-size: 12pt;
            font-weight: bold;
            margin-bottom: 2pt;
        }

        .contact-line {
            font-size: 10pt;
            margin-bottom: 1pt;
        }

        .contact-line .sep {
            margin: 0 4pt;
        }

        .permit-line {
            font-size: 9pt;
            color: #555;
        }

        /* Sections */
        .section {
            margin-top: 7pt;
        }

        .section-title {
            font-size: 10pt;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5pt;
            border-bottom: 0.75pt solid #000;
            padding-bottom: 2pt;
            margin-bottom: 4pt;
        }

        .section-content {
            padding-left: 0;
        }

        /* Summary */
        .summary-block {
            margin-bottom: 8pt;
            line-height: 1.35;
        }

        /* Experience entries */
        .entry {
            margin-bottom: 6pt;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1pt;
        }

        .entry-main {
            flex: 1;
        }

        .entry-role {
            font-size: 10pt;
            font-weight: bold;
        }

        .company {
            font-size: 10pt;
            font-weight: bold;
        }

        .company-desc {
            font-size: 10pt;
            font-weight: normal;
        }

        .entry-date {
            text-align: right;
            white-space: nowrap;
            font-size: 10pt;
            margin-left: 10pt;
        }

        .role-desc {
            font-size: 10pt;
            margin-bottom: 2pt;
        }

        /* Bullets */
        .bullets {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .bullets li {
            position: relative;
            padding-left: 11pt;
            margin-bottom: 1pt;
            font-size: 10pt;
            line-height: 1.25;
        }

        .bullets li::before {
            content: "\2022";
            position: absolute;
            left: 0;
            color: #000;
        }

        /* Skills */
        .skills-section p {
            margin-bottom: 2pt;
        }

        /* Education */
        .edu-entry {
            margin-bottom: 3pt;
        }
    </style>
</head>
<body>
<div class="header-name">
    <div class="name">Name Lastname</div>
</div>
{{BODY}}
</body>
</html>
